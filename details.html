<!-- doctype: Declares the document type as HTML5 to ensure correct rendering in modern web browsers -->
<!DOCTYPE html>
<!-- html: The root container holding all of the document's elements and metadata -->
<html lang="en">

<!-- head: Holds machine-readable information (metadata) about the document, such as character sets and viewport definitions -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPSC-349 Lab 5: Movie Details</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<!-- body: Encloses all the visible, renderable content of the web page shown to the user -->

<body>

    <!-- header: Groups introductory content, branding, and major titles at the top of a page or section -->
    <header>
        <div class="container">
            <h1>Movies Portal</h1>
            <p>View details, reviews, and rating information for a selected movie.</p>
        </div>
    </header>

    <!-- nav: Defines a set of navigation links designed for site-wide or page-specific menus -->
    <nav>
        <ul>
            <li><a href="index.html">Featured Movies</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="collection.html">My Collection</a></li>
            <li><a href="contact.html">Contact Us</a></li>
        </ul>
    </nav>

    <!-- main: Encloses the unique, central content of the document that is not repeated across other pages -->
    <main class="container">

        <!-- section: Groups related content together into distinct thematic regions of a page -->
        <section id="movie-info" class="section">
            <h2 id="movie-title">Movie Details</h2>
            <div class="details-layout">
                <img id="movie-image" src="" alt="">
                <div>
                    <p id="movie-description"></p>
                    <p><strong>Genre:</strong> <span id="movie-genre"></span></p>
                    <p><strong>Year:</strong> <span id="movie-year"></span></p>
                    <p><strong>Rating:</strong> <span id="movie-rating"></span></p>
                </div>
            </div>
        </section>

        <!-- TODO: Add review rendering section here -->

        <!-- TODO: Add Leave a Review section here -->

        <a class="btn" href="index.html">Back to Featured Movies</a>

    </main>

    <!-- footer: Contains concluding page details such as copyright notices and contact information -->
    <footer>
        <p>&copy; 2026 Movies Portal</p>
        <p>Contact us at <a href="mailto:movies@example.com">movies@cspc349.com</a></p>
    </footer>

    <script src="js/app.js"></script>
</body>

</html>
