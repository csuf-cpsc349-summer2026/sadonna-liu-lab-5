<!-- doctype: Declares the document type as HTML5 to ensure correct rendering in modern web browsers -->
<!DOCTYPE html>
<!-- html: The root container holding all of the document's elements and metadata -->
<html lang="en">

<!-- head: Holds machine-readable information (metadata) about the document, such as character sets and viewport definitions -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPSC-349 Lab 4: About</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<!-- body: Encloses all the visible, renderable content of the web page shown to the user -->

<body>



    <!-- main: Encloses the unique, central content of the document that is not repeated across other pages -->
    <main class="container">

        <!-- section: Groups related content together into distinct thematic regions of a page -->
        <section class="section">
            <h2>About</h2>
            <p>Movies Portal is a place to highlight favorite movies, organize a personal collection, and prepare for
                future movie detail pages.</p>

            <!-- ul: Defines an unordered (bulleted) list of items -->
            <ul>
                <li>Feature selected movies and shows on the home page.</li>
                <li>Track each title by genre, year, and rating.</li>
                <li>Collect feedback and suggestions from visitors.</li>
            </ul>
        </section>

    </main>

</body>

</html>
