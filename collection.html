<!-- doctype: Declares the document type as HTML5 to ensure correct rendering in modern web browsers -->
<!DOCTYPE html>
<!-- html: The root container holding all of the document's elements and metadata -->
<html lang="en">

<!-- head: Holds machine-readable information (metadata) about the document, such as character sets and viewport definitions -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPSC-349 Lab 4: My Collection</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<!-- body: Encloses all the visible, renderable content of the web page shown to the user -->

<body>


    <!-- main: Encloses the unique, central content of the document that is not repeated across other pages -->
    <main class="container">

        <!-- section: Groups related content together into distinct thematic regions of a page -->
        <section class="section">
            <h2>My Collection</h2>

            <!-- table: Formats structured tabular data into organized rows, header blocks, and data cells -->
            <div class="table-wrap">
                <table class="movies-table">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Genre</th>
                            <th>Year</th>
                            <th>Rating</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr>
                            <td>The Boys</td>
                            <td>Action / Sci-Fi</td>
                            <td>2019</td>
                            <td>8.7</td>
                        </tr>
                        <tr>
                            <td>Superman</td>
                            <td>Action / Sci-Fi</td>
                            <td>2025</td>
                            <td>8.5</td>
                        </tr>
                        <tr>
                            <td>Avatar: Fire and Ash</td>
                            <td>Science Fiction</td>
                            <td>2025</td>
                            <td>8.9</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

    </main>

</body>

</html>
